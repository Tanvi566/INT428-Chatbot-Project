services:
  - type: web
    name: cs-academic-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this in Render dashboard
      - key: PYTHON_VERSION
        value: 3.10.0
