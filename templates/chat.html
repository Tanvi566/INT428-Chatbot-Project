<!DOCTYPE html>
<html>
<head>
    <title>Cybersecurity Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f8;
        }

        .chat-container {
            width: 100%;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #007bff;
            color: white;
        }

        .header button{
            width:200px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            margin-bottom: 10px;
        }

        .user {
            text-align: right;
            color: blue;
        }

        .bot {
            text-align: left;
            color: green;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
        }

        .input-area button {
            width: 100px;
            margin-left: 10px;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <!-- HEADER -->
    <div class="header">
        <h3>Cybersecurity Chatbot</h3>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- CHAT MESSAGES -->
    <div id="chatBox" class="chat-box">
    {% for chat in chats %}
        <div class="message user"><b>You:</b> {{chat[0]}}</div>
        <div class="message bot"><b>Bot:</b> {{chat[1]}}</div>
    {% endfor %}
    </div>

    <!-- INPUT -->
    <div class="input-area">
        <input type="text" id="message" placeholder="Ask about scams, phishing...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
    if (!localStorage.getItem("username")) {
        window.location.href = "/login-page";
    }

    async function sendMessage() {
        let input = document.getElementById("message");
        let msg = input.value.trim();
        let username = localStorage.getItem("username");

        if (!msg) return;

        let chatBox = document.getElementById("chatBox");

        // Show user message
        chatBox.innerHTML += `<div class="message user"><b>You:</b> ${msg}</div>`;

        // Clear input immediately (fixes your issue)
        input.value = "";

        let res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: username + ":" + msg
            })
        });

        let data = await res.json();

        // Show bot response
        chatBox.innerHTML += `<div class="message bot"><b>Bot:</b> ${data.reply}</div>`;

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function logout() {
        localStorage.removeItem("username");
        window.location.href = "/login-page";
    }
</script>

</body>
</html>
