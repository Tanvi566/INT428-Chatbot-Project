<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic CS Assistant | Expert AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff85a2;
            --accent: #f06292;
            --bg: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            --glass: rgba(255, 255, 255, 0.8);
            --sidebar-glass: rgba(255, 255, 255, 0.5);
            --text: #2d3436;
            --sidebar-width: 300px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            height: 100vh;
            background: var(--bg);
            display: flex;
            overflow: hidden;
            color: var(--text);
            padding: 2vh 2.5vw;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            display: flex;
            box-shadow: 0 20px 60px rgba(255, 133, 162, 0.15);
            overflow: hidden;
            position: relative;
        }

        /* --- SIDEBAR REFINED --- */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--sidebar-glass);
            border-right: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            position: relative;
        }

        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            margin-left: -1px;
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-header {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-btn {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            border: none;
            background: white;
            color: var(--text);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .history-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
        }

        .history-card {
            padding: 12px 15px;
            background: rgba(255,255,255,0.4);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            border: 1px solid transparent;
            transition: 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-card:hover { background: white; border-color: var(--primary); }
        .history-card.active { background: white; border-left: 4px solid var(--primary); font-weight: bold; }

        /* --- VIEWPORT REFINED --- */
        .viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            background: rgba(255, 255, 255, 0.2);
        }

        .view-panel { display: none; flex-direction: column; height: 100%; }
        .view-panel.active { display: flex; }

        header {
            padding: 20px 40px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-btn {
            background: white;
            border: 1px solid rgba(0,0,0,0.05);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--primary);
            transition: 0.2s;
            margin-right: 20px;
        }

        .toggle-btn:hover { background: var(--primary); color: white; }

        .brand h1 { font-size: 1.4rem; color: var(--primary); font-weight: 800; letter-spacing: -0.5px; }
        .brand p { font-size: 0.7rem; color: #a0a0a0; text-transform: uppercase; letter-spacing: 1px; }

        .chat-area, .quiz-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 85%;
            padding: 16px 22px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        .user-msg { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .bot-msg { align-self: flex-start; background: white; border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }

        /* PDF Styles - High Contrast Force */
        .pdf-mode { background: #ffffff !important; color: #000000 !important; }
        .pdf-mode .bot-msg { 
            box-shadow: none !important; 
            border: 2px solid #000000 !important; 
            background-color: #ffffff !important; 
        }
        .pdf-mode .bot-msg, .pdf-mode .bot-msg * { 
            color: #000000 !important; 
        }
        .pdf-mode .user-msg { 
            background-color: #000000 !important; 
            border: 2px solid #000000 !important;
        }
        .pdf-mode .user-msg, .pdf-mode .user-msg * { 
            color: #ffffff !important; 
        }

        footer {
            padding: 20px 40px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .input-wrapper {
            background: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            padding: 8px 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.04);
        }

        .chat-input {
            flex: 1;
            border: none;
            padding: 12px;
            outline: none;
            font-size: 1rem;
        }

        .typing-indicator {
            padding: 10px 40px;
            font-size: 0.8rem;
            color: #999;
            display: none;
        }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
            }
            .sidebar.active { transform: translateX(0); width: 80%; }
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span style="font-weight: 800; color: var(--primary);">STUDY HUB</span>
                    <button class="toggle-btn" onclick="toggleSidebar()" style="margin:0; width:30px; height:30px; font-size: 1rem;">✕</button>
                </div>
                <button class="nav-btn active" id="btn-show-chat">Academic Chat</button>
                <button class="nav-btn" id="btn-show-quiz">Quiz Generator</button>
                <button class="nav-btn" id="btn-show-code">Code Helper</button>
                <hr style="opacity: 0.1;">
                <button class="nav-btn" id="btn-new-chat" style="color: var(--primary); border: 1px dashed var(--primary); background: transparent;">+ New Session</button>
            </div>
            <div style="padding: 10px 25px; font-size: 0.7rem; font-weight: 800; color: #ccc;">HISTORY</div>
            <div class="history-container" id="history-list"></div>
        </aside>

        <main class="viewport">
            <!-- CHAT PANEL -->
            <div id="panel-chat" class="view-panel active">
                <header>
                    <div style="display:flex; align-items:center;">
                        <button class="toggle-btn" onclick="toggleSidebar()" id="desktop-toggle">☰</button>
                        <div class="brand">
                            <h1>CS  ACADEMIC</h1>
                            <p id="status-label">Ready to study</p>
                        </div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <select id="study-mode" style="padding:8px; border-radius:10px; border:1px solid #eee; font-size: 0.8rem;">
                            <option value="detailed">Detailed Study</option>
                            <option value="short">Quick Review</option>
                            <option value="exam">Exam Practice</option>
                        </select>
                        <button class="nav-btn" id="pdf-export" style="width:auto; padding:5px 15px; font-size: 0.8rem;">PDF</button>
                    </div>
                </header>

                <div id="chat-window" class="chat-area"></div>
                <div id="typing" class="typing-indicator">Professor is typing...</div>

                <footer>
                    <div class="input-wrapper">
                        <input type="text" id="user-input" class="chat-input" placeholder="Ask about an algorithm, OS concept, or say hello..." autocomplete="off">
                        <button id="send-btn" style="background:none; border:none; color:var(--primary); font-size:1.5rem; cursor:pointer;">➔</button>
                    </div>
                </footer>
            </div>

            <!-- QUIZ PANEL -->
            <div id="panel-quiz" class="view-panel">
                <header>
                    <div style="display:flex; align-items:center;">
                        <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
                        <div class="brand">
                            <h1>QUIZ MASTER</h1>
                            <p>Assessment Engine</p>
                        </div>
                    </div>
                    <button class="nav-btn" id="pdf-export-quiz" style="width:auto; padding:5px 15px; font-size: 0.8rem; height: 35px; align-self: center;">PDF</button>
                </header>
                <div class="quiz-area">
                    <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03);">
                        <label style="font-weight: 700; font-size: 0.8rem; color: #999; display: block; margin-bottom: 10px;">TOPICS / SYLLABUS</label>
                        <textarea id="quiz-syllabus" style="width:100%; height:80px; border-radius:12px; border:1px solid #eee; padding:15px; margin-bottom:15px;" placeholder="e.g. Dijkstra's Algorithm, Bellman-Ford, Time Complexity..."></textarea>
                        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px; margin-bottom:15px;">
                            <select id="quiz-type" style="padding:12px; border-radius:10px; border:1px solid #eee;">
                                <option value="mcq">Multiple Choice</option>
                                <option value="theory">Theoretical</option>
                                <option value="coding">Coding</option>
                            </select>
                            <select id="quiz-diff" style="padding:12px; border-radius:10px; border:1px solid #eee;">
                                <option value="easy">Introductory</option>
                                <option value="medium">Intermediate</option>
                                <option value="hard">Advanced</option>
                            </select>
                            <input type="number" id="quiz-count" min="1" max="20" value="5" style="padding:12px; border-radius:10px; border:1px solid #eee;" title="Number of Questions">
                        </div>
                        <button class="nav-btn active" id="gen-quiz-btn" style="padding:15px; width: 100%; justify-content: center;">Generate My Quiz</button>
                    </div>
                    <div id="quiz-display" style="margin-top:20px;"></div>
                </div>
            </div>

            <!-- CODE PANEL -->
            <div id="panel-code" class="view-panel">
                <header>
                    <div style="display:flex; align-items:center;">
                        <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
                        <div class="brand">
                            <h1>CODE HELPER</h1>
                            <p>Software Engineering Assistant</p>
                        </div>
                    </div>
                    <button class="nav-btn" id="pdf-export-code" style="width:auto; padding:5px 15px; font-size: 0.8rem; height: 35px; align-self: center;">PDF</button>
                </header>
                <div class="quiz-area">
                    <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03);">
                        <label style="font-weight: 700; font-size: 0.8rem; color: #999; display: block; margin-bottom: 10px;">PROGRAMMING LANGUAGE</label>
                        <select id="code-language" style="padding:12px; border-radius:10px; border:1px solid #eee; margin-bottom:15px; width:100%;">
                            <option value="Python">Python</option>
                            <option value="JavaScript">JavaScript</option>
                            <option value="Java">Java</option>
                            <option value="C++">C++</option>
                            <option value="SQL">SQL</option>
                        </select>
                        <label style="font-weight: 700; font-size: 0.8rem; color: #999; display: block; margin-bottom: 10px;">TASK OR PROBLEM</label>
                        <textarea id="code-prompt" style="width:100%; height:80px; border-radius:12px; border:1px solid #eee; padding:15px; margin-bottom:15px;" placeholder="e.g. Write a binary search algorithm..."></textarea>
                        <button class="nav-btn active" id="gen-code-btn" style="padding:15px; width: 100%; justify-content: center;">Generate Code</button>
                    </div>
                    <div id="code-display" style="margin-top:20px;"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "http://localhost:8000";
        
        // --- State Management ---
        let sessionId = localStorage.getItem('cs_sid') || `session_${Date.now()}`;
        localStorage.setItem('cs_sid', sessionId);

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 900) {
                sidebar.classList.toggle('active');
                sidebar.classList.remove('collapsed');
            } else {
                sidebar.classList.toggle('collapsed');
                sidebar.classList.remove('active');
            }
        }

        function switchView(panelId, btnId) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            document.getElementById(btnId).classList.add('active');
            if(window.innerWidth <= 900) toggleSidebar();
        }

        document.getElementById('btn-show-chat').onclick = () => switchView('panel-chat', 'btn-show-chat');
        document.getElementById('btn-show-quiz').onclick = () => switchView('panel-quiz', 'btn-show-quiz');
        document.getElementById('btn-show-code').onclick = () => switchView('panel-code', 'btn-show-code');

        document.getElementById('btn-new-chat').onclick = () => {
            sessionId = `session_${Date.now()}`;
            localStorage.setItem('cs_sid', sessionId);
            document.getElementById('chat-window').innerHTML = '';
            appendMsg('bot', "Hey! New session started. Ready to dive into some CS today?");
            renderHistory();
            if(window.innerWidth <= 900) toggleSidebar();
        };

        // --- Core Interaction ---
        async function sendChatMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            appendMsg('user', text);
            input.value = '';
            
            const typing = document.getElementById('typing');
            typing.style.display = 'block';
            document.getElementById('status-label').innerText = 'Professor is thinking...';

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'x-api-key': 'demo'},
                    body: JSON.stringify({
                        message: text,
                        session_id: sessionId,
                        mode: document.getElementById('study-mode').value
                    })
                });

                if (!response.ok) throw new Error("Backend Offline");

                const data = await response.json();
                appendMsg('bot', data.response);
                
                // Reload history to show the new message
                renderHistory();

            } catch (e) {
                appendMsg('bot', "**System Error:** Connection to the academic server failed. Please ensure the backend `main.py` is running on port 8000.");
            } finally {
                typing.style.display = 'none';
                document.getElementById('status-label').innerText = 'Ready to study';
            }
        }

        function appendMsg(role, content) {
            const container = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'user-msg' : 'bot-msg'}`;
            div.innerHTML = marked.parse(content);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            try {
                const res = await fetch(`${API_URL}/sessions`);
                const data = await res.json();
                
                data.sessions.forEach(session => {
                    const card = document.createElement('div');
                    card.className = `history-card ${session.session_id === sessionId ? 'active' : ''}`;
                    card.innerText = `${session.summary}...`;
                    card.onclick = () => loadSession(session.session_id);
                    list.appendChild(card);
                });
            } catch (e) {
                console.error("Failed to load history", e);
            }
        }

        async function loadSession(sid) {
            sessionId = sid;
            localStorage.setItem('cs_sid', sid);
            document.getElementById('chat-window').innerHTML = '';
            
            try {
                const res = await fetch(`${API_URL}/sessions/${sid}`);
                const data = await res.json();
                
                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(m => appendMsg(m.role === 'assistant' ? 'bot' : 'user', m.content));
                } else {
                    appendMsg('bot', "Hey there! Ready to dive into some CS today?");
                }
            } catch (e) {
                console.error("Failed to load session", e);
            }
            
            renderHistory();
            if(window.innerWidth <= 900) toggleSidebar();
        }

        // --- Export & Misc ---
        function exportToPdf(elementId, filename) {
            const element = document.getElementById(elementId);
            if (!element || !element.innerHTML.trim()) return;
            element.classList.add('pdf-mode');
            const opt = {
                margin: 10,
                filename: filename,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save().then(() => {
                element.classList.remove('pdf-mode');
            });
        }

        document.getElementById('pdf-export').onclick = () => exportToPdf('chat-window', `Study_Notes_${sessionId}.pdf`);
        document.getElementById('pdf-export-quiz').onclick = () => exportToPdf('quiz-display', `Quiz_${Date.now()}.pdf`);
        document.getElementById('pdf-export-code').onclick = () => exportToPdf('code-display', `Code_${Date.now()}.pdf`);

        document.getElementById('send-btn').onclick = sendChatMessage;
        document.getElementById('user-input').onkeypress = (e) => {
            if (e.key === 'Enter') sendChatMessage();
        };

        // --- Quiz Generator ---
        document.getElementById('gen-quiz-btn').onclick = async () => {
            const syllabus = document.getElementById('quiz-syllabus').value;
            const display = document.getElementById('quiz-display');
            if(!syllabus) return;

            display.innerHTML = '<div class="msg bot-msg">Generating specific assessment...</div>';
            
            try {
                const res = await fetch(`${API_URL}/quiz`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'x-api-key': 'demo'},
                    body: JSON.stringify({
                        syllabus: syllabus,
                        type: document.getElementById('quiz-type').value,
                        level: document.getElementById('quiz-diff').value,
                        num_questions: parseInt(document.getElementById('quiz-count').value) || 5,
                        session_id: sessionId
                    })
                });
                const data = await res.json();
                display.innerHTML = `<div class="msg bot-msg">${marked.parse(data.response)}</div>`;
            } catch (e) {
                display.innerHTML = '<div class="msg bot-msg">Error: Check your backend connection.</div>';
            }
        };

        // --- Code Generator ---
        document.getElementById('gen-code-btn').onclick = async () => {
            const prompt = document.getElementById('code-prompt').value;
            const display = document.getElementById('code-display');
            if(!prompt) return;

            display.innerHTML = '<div class="msg bot-msg">Writing optimized code...</div>';
            
            try {
                const res = await fetch(`${API_URL}/code`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'x-api-key': 'demo'},
                    body: JSON.stringify({
                        prompt: prompt,
                        language: document.getElementById('code-language').value,
                        session_id: sessionId
                    })
                });
                const data = await res.json();
                display.innerHTML = `<div class="msg bot-msg" style="max-width: 100%;">${marked.parse(data.response)}</div>`;
            } catch (e) {
                display.innerHTML = '<div class="msg bot-msg">Error: Check your backend connection.</div>';
            }
        };

        window.onload = () => {
            loadSession(sessionId);
        };
    </script>
</body>
</html>
